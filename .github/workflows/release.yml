name: "Release"

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # renovate: datasource=python-version depName=python
  PYTHON_VERSION: 3.14
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.24

jobs:
  release:
    name: Build & publish to PyPI
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      id-token: write  # needed for OIDC-based PyPI publishing
      attestations: write  # needed for build provenance attestation

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        name: Checkout
        with:
          persist-credentials: false
      - name: Install uv ${{ env.UV_VERSION }} & Python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
        with:
          # Purposefully disabling cache for release operations
          enable-cache: false
          python-version: ${{ env.PYTHON_VERSION }}
          version: ${{ env.UV_VERSION }}

      - name: Build package
        run: uv build

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI (with release attestation)
        run: uv publish --attest
